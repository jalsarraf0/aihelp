name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  regression-security:
    runs-on: [self-hosted, linux, x64, aihelp]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Run full regression and security gate
        run: bash scripts/ci/full_regression.sh

  sanity-check:
    runs-on: [self-hosted, linux, x64, aihelp]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Compile sanity check
        run: cargo check --all-features --all-targets
