name: ci

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regression-security:
    runs-on: [self-hosted, gentoo]
    timeout-minutes: 45
    env:
      DOCKER_RUNNER_CACHE: /tmp/docker-runner
      DOCKER_RUNNER_PRUNE: "true"
    steps:

      - uses: actions/checkout@v4

      - name: Initialize Docker runner cache
        run: mkdir -p /tmp/docker-runner/{images,cache,artifacts}

      - name: Run full regression and security gate
        run: bash .github/scripts/docker-runner.sh rust:1.93-bookworm "bash scripts/ci/full_regression.sh"

  sanity-check:
    runs-on: [self-hosted, gentoo]
    timeout-minutes: 30
    env:
      DOCKER_RUNNER_CACHE: /tmp/docker-runner
      DOCKER_RUNNER_PRUNE: "true"
    steps:

      - uses: actions/checkout@v4

      - name: Initialize Docker runner cache
        run: mkdir -p /tmp/docker-runner/{images,cache,artifacts}

      - name: Compile sanity check
        run: bash .github/scripts/docker-runner.sh rust:1.93-bookworm "cargo check --all-features --all-targets"
