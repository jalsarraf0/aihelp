name: release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: build-${{ matrix.os }}
    runs-on: [self-hosted, gentoo]
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: aihelp-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: aihelp-${{ github.ref_name }}-x86_64-apple-darwin.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: aihelp-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package artifact (Unix)
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/aihelp" aihelp
          chmod +x aihelp
          tar -czf "dist/${{ matrix.asset }}" aihelp

      - name: Package artifact (Windows)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/aihelp.exe" "aihelp.exe"
          Compress-Archive -Path "aihelp.exe" -DestinationPath "dist/${{ matrix.asset }}" -Force

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/${{ matrix.asset }}

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}

  publish:
    name: publish-release
    runs-on: [self-hosted, gentoo]
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
          generate_release_notes: true
