name: security

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1"

jobs:
  cargo-audit:
    runs-on: [self-hosted, linux, x64, aihelp]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Bootstrap cargo-audit
        run: bash scripts/ci/bootstrap_cargo_audit.sh
      - name: Audit dependencies
        run: cargo audit
